<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>司律一試考古題 — 個人化複習平台</title>
  <script>
    // GitHub Pages SPA redirect: redirect all 404 paths back to index.html
    // preserving the path for the client-side router
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    window.location.replace(
      window.location.origin + '/?redirect=' + encodeURIComponent(path + search + hash)
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
